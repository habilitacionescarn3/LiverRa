# LiverRa pre-commit hooks
# Install: `pip install pre-commit && pre-commit install`
# Run manually: `pre-commit run --all-files`

repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.7.4
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
        files: ^packages/ml-inference/
      - id: ruff-format
        files: ^packages/ml-inference/

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.13.0
    hooks:
      - id: mypy
        files: ^packages/ml-inference/src/
        args: [--strict, --ignore-missing-imports]
        additional_dependencies:
          - fastapi>=0.115
          - pydantic>=2.9
          - sqlalchemy>=2.0
          - types-PyYAML
          - types-requests
          - httpx>=0.27
          - sentry-sdk[fastapi]>=2.16

  - repo: https://github.com/pre-commit/mirrors-eslint
    rev: v9.15.0
    hooks:
      - id: eslint
        files: \.(js|jsx|ts|tsx)$
        types: [file]
        additional_dependencies: []

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        types_or: [ts, tsx, javascript, json, yaml, markdown, css]

  # Custom LiverRa guard hooks
  - repo: local
    hooks:
      - id: no-bulk-regex-touch
        name: no-bulk-regex-touch (Constitution §No Bulk File Edits)
        entry: scripts/hooks/no-bulk-regex-touch.sh
        language: script
        pass_filenames: false
        stages: [pre-commit]
        description: >
          Rejects commits touching >3 files with identical line-level edits.
          MediMind regression: 377 files corrupted by regex — required full revert.

      - id: no-handedit-gen-files
        name: Reject hand edits to *.gen.ts without matching contract change
        entry: scripts/hooks/no-handedit-gen.sh
        language: script
        files: '\.gen\.ts$'
        stages: [pre-commit]
        description: >
          `.gen.ts` files are regenerated by `npm run generate:openapi-client`
          (or `generate:fhir-types`) and must not be hand-edited. Rejects any
          commit touching a `.gen.ts` unless it also touches
          `contracts/api-openapi.yaml` or `matrix.yaml` (T075).
