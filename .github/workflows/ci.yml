name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Least-privilege defaults. Individual jobs escalate only when required
# (e.g. ci-bundle-check needs pull-requests:write to post the size table).
permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # -----------------------------------------------------------------
  # TypeScript / Node unit tests across the Turborepo workspaces
  # (packages/app, packages/core, packages/imaging, packages/fhirtypes)
  # -----------------------------------------------------------------
  ci-unit-ts:
    name: Unit tests (TypeScript)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Run TS unit tests
        run: npm run test -- --filter='!@liverra/ml-inference'
        env:
          CI: 'true'
      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ts-coverage
          path: |
            packages/*/coverage/**
          if-no-files-found: ignore

  # -----------------------------------------------------------------
  # Python unit tests for packages/ml-inference (FastAPI + MONAI)
  # -----------------------------------------------------------------
  ci-unit-py:
    name: Unit tests (Python)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    defaults:
      run:
        working-directory: packages/ml-inference
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: packages/ml-inference/requirements*.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]' -r requirements.txt
      - name: Run pytest
        run: pytest --maxfail=1 --disable-warnings -q --cov=src --cov-report=xml
      - name: Upload Python coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: py-coverage
          path: packages/ml-inference/coverage.xml
          if-no-files-found: ignore

  # -----------------------------------------------------------------
  # Linting — ESLint for TS, ruff for Python
  # -----------------------------------------------------------------
  ci-lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Node deps
        run: npm ci
      - name: ESLint
        run: npm run lint
      - name: Install Python linters
        run: pip install ruff
      - name: Ruff
        run: ruff check packages/ml-inference

  # -----------------------------------------------------------------
  # TypeScript type-checking (tsc --noEmit across workspaces)
  # -----------------------------------------------------------------
  ci-typecheck:
    name: Typecheck (tsc --noEmit)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Typecheck
        run: npm run typecheck

  # -----------------------------------------------------------------
  # Contract tests — OpenAPI + FHIR contract fixtures under
  # specs/001-zero-training-mvp/contracts/
  # -----------------------------------------------------------------
  ci-contract:
    name: Contract tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Run contract tests
        run: npm run test:contract

  # -----------------------------------------------------------------
  # ML regression tests — nightly-equivalent Dice / AUC thresholds on
  # the frozen validation mini-set. Blocks on regression >2% vs MBoM
  # recorded metrics (research §C.8 + plan §Testing Strategy).
  # -----------------------------------------------------------------
  ci-ml-regression:
    name: ML regression suite
    runs-on: ubuntu-latest
    timeout-minutes: 40
    permissions:
      contents: read
    defaults:
      run:
        working-directory: packages/ml-inference
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: packages/ml-inference/requirements*.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]' -r requirements.txt
      - name: Run ML regression suite
        run: pytest tests/ml_regression --maxfail=1 -q

  # -----------------------------------------------------------------
  # RBAC red-team — negative matrix drills (plan §Security scanning
  # + research §X.3). Ensures every role blocked from every permission
  # it is not granted. Blocks on any allowed crossover.
  # -----------------------------------------------------------------
  ci-rbac-red-team:
    name: RBAC red team
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    defaults:
      run:
        working-directory: packages/ml-inference
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: packages/ml-inference/requirements*.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]' -r requirements.txt
      - name: Run RBAC red-team tests
        run: pytest tests/rbac_red_team --maxfail=1 -q

  # -----------------------------------------------------------------
  # FHIR integration — Medplum local container + StructureDefinition
  # bootstrap + resource round-trip smoke (plan §Testing Strategy).
  # -----------------------------------------------------------------
  ci-fhir-integration:
    name: FHIR integration
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    services:
      medplum:
        image: medplum/medplum-server:latest
        ports:
          - 8103:8103
        options: >-
          --health-cmd "curl -f http://localhost:8103/healthcheck || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: packages/ml-inference/requirements*.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e 'packages/ml-inference[dev]' -r packages/ml-inference/requirements.txt
      - name: Bootstrap Medplum project
        run: python packages/ml-inference/scripts/bootstrap-medplum-project.py --ci
        env:
          MEDPLUM_BASE_URL: http://localhost:8103
      - name: Run FHIR integration tests
        run: pytest packages/ml-inference/tests/fhir_integration --maxfail=1 -q

  # -----------------------------------------------------------------
  # Bundle-size budget enforcement (T403)
  # -----------------------------------------------------------------
  ci-bundle-check:
    name: Bundle size budget
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: write
    env:
      BASE_REF: ${{ github.base_ref || 'main' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Build frontend with stats
        run: npm run build -- --filter=@liverra/app
        env:
          BUNDLE_STATS: '1'
      - name: Restore baseline stats
        uses: actions/cache@v4
        with:
          path: packages/app/baseline-stats.json
          key: bundle-baseline-${{ env.BASE_REF }}
      - name: Evaluate bundle budgets
        id: bundle
        run: node scripts/ci-bundle-check.mjs
      - name: Post bundle size PR comment
        if: github.event_name == 'pull_request' && always()
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body-path: bundle-report.md
          edit-mode: replace
          comment-tag: bundle-size-report

  # -----------------------------------------------------------------
  # i18n validation — AST walk ensures every t('...') call has a key
  # in en/de/ka JSON (T376 + T377).
  # -----------------------------------------------------------------
  ci-i18n:
    name: i18n key parity
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Validate translation keys (AST walk)
        run: npx tsx scripts/i18n-check.ts

  # -----------------------------------------------------------------
  # i18n visual — Playwright screenshots in en/de/ka to detect layout
  # breakage caused by long German/Georgian strings (plan §i18n
  # wiring + §Testing Strategy).
  # -----------------------------------------------------------------
  ci-i18n-visual:
    name: i18n visual regression
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Run i18n visual tests
        run: npm run test:i18n-visual

  # -----------------------------------------------------------------
  # Forbidden-color guard — enforces theme.css variable usage.
  # Fails on raw hex colors in component source (T378 + T379,
  # CLAUDE.md §Unified Color System).
  # -----------------------------------------------------------------
  ci-forbidden-colors:
    name: Forbidden colors
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Scan for forbidden hex colors
        run: bash scripts/forbidden-colors-scan.sh

  # -----------------------------------------------------------------
  # ACR readout theming gate (002-acr-structured-readout T004).
  # Forbids any literal hex colors inside the ACR section components —
  # they MUST consume var(--emr-*) tokens. Plan §Theming compliance gate.
  # -----------------------------------------------------------------
  ci-acr-theming:
    name: ACR readout theming gate
    runs-on: ubuntu-latest
    timeout-minutes: 2
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Reject hex literals in ACR components
        run: |
          if git grep -nE '#([0-9a-fA-F]{3,8})\b' -- 'packages/app/src/emr/components/report/ACR*'; then
            echo "::error::Hex color literals found in ACR readout components - use var(--emr-*) tokens instead."
            exit 1
          fi
          echo "ACR readout theming gate: clean."

  # -----------------------------------------------------------------
  # ACR cross-channel parity gate (002-acr-structured-readout T005).
  # Release-blocking: TS plain-text renderer, Python plain-text renderer,
  # and PDF section text must be byte-equivalent for the shared fixtures.
  # See plan.md and tasks.md T077.
  # -----------------------------------------------------------------
  ci-acr-cross-channel-parity:
    name: ACR cross-channel parity (release-blocking)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    defaults:
      run:
        working-directory: packages/ml-inference
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: packages/ml-inference/requirements*.txt
      - name: Install Node deps
        working-directory: .
        run: npm ci
      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]' -r requirements.txt
      - name: Cross-channel parity (TS ↔ Python ↔ PDF)
        run: pytest tests/integration/test_acr_renderer_cross_channel_parity.py -v

  # -----------------------------------------------------------------
  # Palette CVD check — T411 emits palette-cvd-report.json; this job
  # asserts the report is green (deuteranopia/protanopia/tritanopia
  # contrast ≥ 3:1 for every semantic token pair). T463 wiring.
  # -----------------------------------------------------------------
  ci-palette-cvd-check:
    name: Palette CVD check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Run palette CVD simulator
        run: npm run palette-cvd-check

  # -----------------------------------------------------------------
  # Model licence-drift check (T137, FR-038).
  # Runs scripts/license-check.sh which validates each MBoM entry's
  # pinned license_text_hash against the live upstream LICENSE file.
  # Blocking: any drift fails the build — a human must re-verify.
  # -----------------------------------------------------------------
  ci-license-check:
    name: Model licence drift
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq
      - name: Generate MBoM
        run: bash scripts/model-bom.sh
      - name: Licence-drift check
        run: bash scripts/license-check.sh

  # -----------------------------------------------------------------
  # Lighthouse — web-vitals budget on the built app (LCP/CLS/FID).
  # Plan §Performance budgets.
  # -----------------------------------------------------------------
  ci-lighthouse:
    name: Lighthouse web-vitals
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Build frontend
        run: npm run build -- --filter=@liverra/app
      - name: Run Lighthouse CI
        run: npx @lhci/cli@0.14 autorun

  # -----------------------------------------------------------------
  # Viewer FPS — headless Cornerstone3D harness; asserts scroll FPS
  # ≥ 30 on the 512³ reference volume (plan §Performance budgets,
  # FR-013 ≤1 s resection-plane drag).
  # -----------------------------------------------------------------
  ci-viewer-fps:
    name: Viewer FPS benchmark
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Run viewer FPS harness
        run: npm run test:viewer-fps

  # -----------------------------------------------------------------
  # Alembic migrations — asserts every migration applies cleanly on
  # an empty Postgres + downgrades to base without residuals. Plan
  # §DB migrations.
  # -----------------------------------------------------------------
  ci-alembic-migrations:
    name: Alembic migration round-trip
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: liverra
          POSTGRES_PASSWORD: liverra
          POSTGRES_DB: liverra_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U liverra"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    defaults:
      run:
        working-directory: packages/ml-inference
    env:
      DATABASE_URL: postgresql+asyncpg://liverra:liverra@localhost:5432/liverra_ci
      ALEMBIC_DATABASE_URL: postgresql://liverra:liverra@localhost:5432/liverra_ci
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: packages/ml-inference/requirements*.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]' -r requirements.txt
      - name: Alembic reversibility (upgrade → downgrade → re-upgrade with schema-snapshot diff)
        run: pytest tests/migrations/test_alembic_reversibility.py -v --maxfail=1

  # -----------------------------------------------------------------
  # DICOM UID root present — FR go-live gate. Asserts AWS Secrets
  # Manager key `liverra/dicom-uid-root` exists (T404).
  # -----------------------------------------------------------------
  ci-dicom-uid-present:
    name: DICOM UID root secret present
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      id-token: write
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_CI_ROLE_ARN }}
          aws-region: eu-central-1
      - name: Assert secret exists
        run: |
          set -euo pipefail
          aws secretsmanager describe-secret \
            --secret-id liverra/dicom-uid-root \
            --region eu-central-1 >/dev/null
          echo "dicom-uid-root secret is present"

  # -----------------------------------------------------------------
  # UI agent check — enforces that UI PRs include a `[frontend-designer]`
  # annotation in the PR body (CLAUDE.md mandates all UI via the agent).
  # Both github.base_ref and the PR body are read via env: to prevent
  # GitHub Actions command-injection (never interpolated into run:).
  # -----------------------------------------------------------------
  ci-ui-agent-check:
    name: UI agent attestation
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: read
    env:
      BASE_REF: ${{ github.base_ref }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Detect UI file changes
        id: detect
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          set -euo pipefail
          CHANGED=$(git diff --name-only "origin/${BASE_REF}...HEAD")
          echo "$CHANGED" | grep -E '^packages/app/src/.*\.(tsx|css|scss)$' > changed-ui.txt || true
          if [ -s changed-ui.txt ]; then
            echo "ui_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "ui_changed=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Verify frontend-designer attestation in PR body
        if: steps.detect.outputs.ui_changed == 'true'
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          if ! printf '%s' "$PR_BODY" | grep -qi '\[frontend-designer\]'; then
            echo "::error::UI files changed but PR body is missing '[frontend-designer]' attestation. All UI work must flow through the frontend-designer agent (see CLAUDE.md)."
            exit 1
          fi
