name: E2E (CPU)

# T373 — Runs the 27 parallelizable CPU-only E2E scenarios. Blocks on PRs
# into main. GPU-only scenarios (US1/US4/US8) are handled by e2e-gpu.yml.
#
# User-story mapping (plan §Testing Strategy):
#   - test-us2  : Surgeon reviews analysis + refines mask
#   - test-us3  : Radiologist uploads + triages
#   - test-us5  : PACS C-STORE push with retry/fallback
#   - test-us6  : Auto-generated PDF + DICOM-SR report
#   - test-us7  : Multi-tenant isolation (RBAC + AccessPolicy)
#   - test-us9  : Compliance dashboard + spot-check workflow
#   - test-us10 : DPO erasure + crypto-shred
#
# Each job is self-contained and invoked from a matrix so they run in
# parallel; the overall `e2e-cpu` check blocks on the matrix sum.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: e2e-cpu-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e-cpu:
    name: E2E (CPU) — ${{ matrix.scenario }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        scenario:
          # US2 — reviewer workflow (5 scenarios)
          - us2-open-case
          - us2-refine-mask
          - us2-override-classification
          - us2-abstention-banner
          - us2-undo-stack
          # US3 — upload + triage (4 scenarios)
          - us3-upload-happy-path
          - us3-upload-corrupt-dicom
          - us3-cancel-analysis
          - us3-retry-failed-stage
          # US5 — PACS push (4 scenarios)
          - us5-cstore-success
          - us5-cstore-retry
          - us5-cstore-manual-fallback
          - us5-cecho-preflight
          # US6 — report generation (4 scenarios)
          - us6-pdf-layout
          - us6-dicom-sr-export
          - us6-ruo-watermark
          - us6-finalize-step-up
          # US7 — multi-tenant isolation (3 scenarios)
          - us7-cross-tenant-denied
          - us7-tenant-config-scope
          - us7-fhir-accesspolicy
          # US9 — compliance dashboard (4 scenarios)
          - us9-mbom-view
          - us9-claim-registry-toggle
          - us9-audit-chain-verify
          - us9-spot-check-ruo
          # US10 — DPO erasure (3 scenarios)
          - us10-erasure-request
          - us10-crypto-shred-within-60s
          - us10-erasure-confirmation-pdf
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: packages/ml-inference/requirements*.txt
      - name: Install Node deps
        run: npm ci
      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r packages/ml-inference/requirements.txt -r packages/ml-inference/requirements-dev.txt
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Bring up local stack (CPU Triton stub)
        run: |
          bash scripts/switch-env.sh local
          docker compose -f deploy/local/docker-compose.yml up -d --wait
      - name: Run scenario
        env:
          SCENARIO: ${{ matrix.scenario }}
        run: npm run test:e2e -- --grep "${SCENARIO}"
      - name: Upload trace + screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-cpu-${{ matrix.scenario }}-artifacts
          path: |
            packages/app/playwright-report/**
            packages/app/test-results/**
          if-no-files-found: ignore
      - name: Tear down
        if: always()
        run: docker compose -f deploy/local/docker-compose.yml down --volumes
