name: E2E (GPU)

# T374 — Runs the 3 GPU-serial E2E scenarios that require real Triton
# inference (US1/US4/US8). Blocks on release branches + runs nightly on
# main. Uses a self-hosted runner with label `gpu` — provisioned ops-side
# with NVIDIA driver ≥ 555, Docker 24+, and nvidia-container-toolkit.
#
# Serial execution is deliberate: the runner exposes a single L4 24 GB
# GPU and Tier-A models (STU-Net parenchyma + lesions + Couinaud ≈ 14.5
# GB) are pinned in VRAM per research §C.1.
#
# User-story mapping:
#   - test-us1 : End-to-end analysis on the reference AMOS22 case
#   - test-us4 : Lesion classification + temperature-scaled abstention
#   - test-us8 : Interactive refinement (VISTA3D click + MedSAM-2 prompt)

on:
  push:
    branches:
      - 'release/**'
  schedule:
    # Nightly at 02:30 UTC (after daily Merkle-root at 02:00)
    - cron: '30 2 * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: e2e-gpu-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  e2e-gpu:
    name: E2E (GPU) — ${{ matrix.scenario }}
    runs-on: [self-hosted, gpu]
    timeout-minutes: 90
    permissions:
      contents: read
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        scenario:
          - us1-end-to-end-amos22
          - us4-classification-abstention
          - us8-interactive-refinement
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: packages/ml-inference/requirements*.txt
      - name: Install Node deps
        run: npm ci
      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r packages/ml-inference/requirements.txt -r packages/ml-inference/requirements-dev.txt
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Verify GPU available
        run: nvidia-smi
      - name: Bring up GPU stack (real Triton)
        run: |
          bash scripts/switch-env.sh production
          docker compose \
            -f deploy/local/docker-compose.yml \
            -f deploy/local/docker-compose.gpu.override.yml \
            up -d --wait
      - name: Warm Tier-A models
        run: python packages/ml-inference/scripts/warm-tier-a.py
      - name: Run scenario
        env:
          SCENARIO: ${{ matrix.scenario }}
        run: npm run test:e2e:gpu -- --grep "${SCENARIO}"
      - name: Collect Triton metrics
        if: always()
        env:
          SCENARIO: ${{ matrix.scenario }}
        run: |
          curl -sS http://localhost:8002/metrics > "triton-metrics-${SCENARIO}.txt" || true
      - name: Upload artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-gpu-${{ matrix.scenario }}-artifacts
          path: |
            packages/app/playwright-report/**
            packages/app/test-results/**
            triton-metrics-*.txt
          if-no-files-found: ignore
      - name: Tear down
        if: always()
        run: |
          docker compose \
            -f deploy/local/docker-compose.yml \
            -f deploy/local/docker-compose.gpu.override.yml \
            down --volumes
