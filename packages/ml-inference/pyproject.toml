[project]
name = "liverra-ml-inference"
version = "0.0.1"
description = "LiverRa ML inference service — FastAPI + Triton + MONAI"
requires-python = ">=3.11"
authors = [
  { name = "DevoteAI", email = "team@updevoteai.com" }
]
license = { text = "UNLICENSED" }

dependencies = [
    # To be populated by first implementation spec
    # Expected: fastapi, uvicorn, monai, torch, nibabel, pydicom, highdicom, SimpleITK
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio",
    "ruff",
    "mypy",
]

[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.mypy]
python_version = "3.11"
strict = true
