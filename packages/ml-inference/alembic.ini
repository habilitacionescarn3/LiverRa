# LiverRa Alembic configuration (T051)
# Migrations run against the Postgres cluster identified by DATABASE_URL.
#
# DATABASE_URL must use the asyncpg driver, e.g.
#   postgresql+asyncpg://liverra:<pw>@localhost:5432/liverra
#
# Apply: alembic upgrade head
# Revert: alembic downgrade -1
# Generate offline SQL: alembic upgrade head --sql

[alembic]
script_location = src/db/alembic
prepend_sys_path = .
version_path_separator = os
timezone = UTC

# DATABASE_URL is read at runtime by src/db/alembic/env.py from the process
# environment. The value below is a no-op placeholder; env.py ignores it.
sqlalchemy.url = driver://placeholder-set-DATABASE_URL-env-var

# File naming: YYYYMMDD_NNNN_slug.py — keeps the versions/ directory
# sortable by date and matches tasks.md T052–T058 filenames.
file_template = %%(year)d%%(month).2d%%(day).2d_%%(rev)s_%%(slug)s

# ---------------------------------------------------------------------------
# Logging
# ---------------------------------------------------------------------------

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
