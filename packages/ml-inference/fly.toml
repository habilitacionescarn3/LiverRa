# LiverRa backend on Fly.io — single app, two process groups (api + worker).
#
# Deploy with:
#   cd packages/ml-inference
#   fly launch --name liverra-api --region fra --no-deploy
#   fly secrets set $(cat ../../scripts/fly-secrets.env | xargs)
#   fly deploy
#
# Two machines spawned: one runs uvicorn, one runs celery. Both share secrets.
# Migrations run automatically on every deploy via release_command.

app = "liverra-api"
primary_region = "fra"  # Frankfurt — GDPR data residency for PHI-adjacent traffic.

[build]
  dockerfile = "Dockerfile"

[deploy]
  # release_command intentionally omitted — migrations are run manually
  # against Supabase via scripts/deploy-migrate.sh. Re-add later when
  # deploys want to migrate automatically. Removing avoids the
  # release-command machine timeout against the Supabase pooler.

# ---------------------------------------------------------------------------
# Two process groups → two machines from the same image.
# ---------------------------------------------------------------------------
[processes]
  api    = "api"
  worker = "worker"

# ---------------------------------------------------------------------------
# HTTP listener — only the api process group serves HTTP.
# ---------------------------------------------------------------------------
[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"          # idle scale-to-zero is fine for testing
  auto_start_machines = true
  min_machines_running = 0
  processes = ["api"]

  [http_service.concurrency]
    type = "requests"
    soft_limit = 25
    hard_limit = 50

  [[http_service.checks]]
    grace_period = "20s"
    interval = "30s"
    method = "GET"
    timeout = "10s"
    path = "/api/v1/system/health"

# ---------------------------------------------------------------------------
# Machine sizing
# ---------------------------------------------------------------------------
[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
  processes = ["api"]

[[vm]]
  size = "performance-cpu-1x"
  memory = "2gb"                       # NIfTI conversion on 2000+ DICOM slices needs >1GB
  processes = ["worker"]

# ---------------------------------------------------------------------------
# Env (non-secret defaults — real values via `fly secrets set`)
# ---------------------------------------------------------------------------
[env]
  LIVERRA_ENV = "staging"
  LIVERRA_CASCADE_REAL_MODE = "true"
  LIVERRA_CASCADE_BUDGET_MULT = "15"
  LIVERRA_INFERENCE_TIMEOUT_S = "1800"
  PORT = "8080"
