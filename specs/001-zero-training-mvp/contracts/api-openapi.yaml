      tags: [ops]
      x-required-permission: ops.mark_blocked
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                note: { type: string }
      responses:
        '204': { description: Marked blocked — submitting clinician notified }

  /compliance/mbom:
