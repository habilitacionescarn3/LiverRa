      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/ClaimRegistryEntry' }
    put:
      tags: [compliance]
      x-required-permission: compliance.toggle_claim_registry
      x-step-up: true
      requestBody:
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ClaimRegistryEntry' }
      responses:
        '200': { description: Updated (subsequent exports narrow disclaimer scope) }

  /erasure/requests:
    post:
      tags: [erasure]
      x-required-permission: erasure.execute
      x-step-up: true
      summary: Initiate GDPR Art. 17 erasure for a specific Study (FR-040)
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                target_study_id: { type: string, format: uuid }
                justification: { type: string }
      responses:
        '202':
