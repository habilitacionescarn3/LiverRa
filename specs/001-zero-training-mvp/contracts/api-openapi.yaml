                    pinned_commit_sha: { type: string }
                    license_text_hash_hex: { type: string }
                    license_name: { type: string }
                    integration_date: { type: string, format: date }
                    approver: { type: string, format: email }

  /compliance/audit-summary:
    get:
      tags: [compliance]
      x-required-permission: compliance.generate_audit_summary
      parameters:
        - { name: tenant_id, in: query, required: true, schema: { type: string, format: uuid } }
        - { name: from, in: query, required: true, schema: { type: string, format: date-time } }
        - { name: to, in: query, required: true, schema: { type: string, format: date-time } }
      responses:
        '200':
          description: Tamper-evident audit summary with chain verification
          content:
            application/json:
              schema:
                type: object
                properties:
                  events: { type: array, items: { $ref: '#/components/schemas/AuditEventSummary' } }
                  chain_valid: { type: boolean }
                  chain_first_invalid_sequence_no: { type: integer, nullable: true }
