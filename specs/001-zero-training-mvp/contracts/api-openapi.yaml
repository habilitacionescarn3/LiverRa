  /compliance/ruo-spot-check:
    post:
      tags: [compliance]
      x-required-permission: compliance.spot_check_ruo
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                sample_size: { type: integer, default: 20 }
      responses:
        '200':
          description: Sampled artifacts with watermark-region highlighted
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    artifact_url: { type: string, format: uri }
