# LiverRa — local development stack
# Brought up by `scripts/switch-env.sh local && docker compose -f deploy/local/docker-compose.yml up -d`
# See quickstart.md §3.

name: liverra-local

services:
  postgres:
    image: postgres:16
    container_name: liverra-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-liverra}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-liverra}
      POSTGRES_DB: ${POSTGRES_DB:-liverra}
    ports:
      - "5432:5432"
    volumes:
      - liverra_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-liverra}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7
    container_name: liverra-redis
    ports:
      - "6379:6379"
    volumes:
      - liverra_redis_data:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  orthanc:
    image: orthancteam/orthanc:24.10.1
    container_name: liverra-orthanc
    environment:
      ORTHANC__NAME: LiverRa-Local
      ORTHANC__REGISTERED_USERS: |
        {"${ORTHANC_USERNAME:-orthanc}":"${ORTHANC_PASSWORD:-orthanc}"}
      ORTHANC__DICOM_WEB__ENABLE: "true"
      ORTHANC__POSTGRESQL__ENABLE_INDEX: "true"
      ORTHANC__POSTGRESQL__HOST: postgres
      ORTHANC__POSTGRESQL__PORT: 5432
      ORTHANC__POSTGRESQL__USERNAME: ${POSTGRES_USER:-liverra}
      ORTHANC__POSTGRESQL__PASSWORD: ${POSTGRES_PASSWORD:-liverra}
      ORTHANC__POSTGRESQL__DATABASE: ${POSTGRES_DB:-liverra}
      LIVERRA_ANON_SIDECAR_URL: ${LIVERRA_ANON_SIDECAR_URL:-}
    ports:
      - "4242:4242"   # DIMSE (DICOM protocol)
      - "8042:8042"   # REST + DICOMweb
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - liverra_orthanc_data:/var/lib/orthanc/db
    healthcheck:
      # Orthanc's image ships python3 but no curl/wget. urllib keeps the
      # healthcheck self-contained and arch-agnostic (ARM + x86).
      test:
        - CMD-SHELL
        - >
          python3 -c "import base64, urllib.request;
          u='${ORTHANC_USERNAME:-orthanc}'; p='${ORTHANC_PASSWORD:-orthanc}';
          t=base64.b64encode(f'{u}:{p}'.encode()).decode();
          r=urllib.request.Request('http://localhost:8042/system',
          headers={'Authorization':'Basic '+t});
          urllib.request.urlopen(r, timeout=4).read()"
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  anon-sidecar:
    # Local-dev DICOM anonymizer. Calls Orthanc's built-in anonymize
    # endpoint to scrub PHI tags. NOT regulatory-grade — production
    # uses CTP/MIRC per docs/research/07-technical-architecture.md.
    build:
      context: ../../packages/ml-inference/anon_sidecar
      dockerfile: Dockerfile
    container_name: liverra-anon-sidecar
    environment:
      ORTHANC_URL: http://orthanc:8042
      ORTHANC_USERNAME: ${ORTHANC_USERNAME:-orthanc}
      ORTHANC_PASSWORD: ${ORTHANC_PASSWORD:-orthanc}
      DATABASE_URL_SYNC: postgresql://${POSTGRES_USER:-liverra}:${POSTGRES_PASSWORD:-liverra}@postgres:5432/${POSTGRES_DB:-liverra}
    ports:
      - "7070:7070"
    depends_on:
      postgres:
        condition: service_healthy
      orthanc:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python3 -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:7070/health\", timeout=3)'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  medplum:
    image: medplum/medplum-server:latest
    container_name: liverra-medplum
    # `env` tells Medplum to load config from MEDPLUM_* environment variables
    # rather than the default `medplum.config.json` file lookup.
    command: ["env"]
    environment:
      MEDPLUM_DATABASE_HOST: postgres
      MEDPLUM_DATABASE_PORT: "5432"
      MEDPLUM_DATABASE_USERNAME: ${POSTGRES_USER:-liverra}
      MEDPLUM_DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-liverra}
      MEDPLUM_DATABASE_DBNAME: medplum
      MEDPLUM_REDIS_HOST: redis
      MEDPLUM_REDIS_PORT: "6379"
      MEDPLUM_PORT: "8103"
      MEDPLUM_BASE_URL: ${MEDPLUM_BASE_URL:-http://localhost:8103/}
      MEDPLUM_ISSUER: ${MEDPLUM_BASE_URL:-http://localhost:8103/}
      MEDPLUM_AUDIENCE: ${MEDPLUM_BASE_URL:-http://localhost:8103/}
      MEDPLUM_BINARY_STORAGE: file:./binary
      MEDPLUM_STORAGE_BASE_URL: ${MEDPLUM_BASE_URL:-http://localhost:8103/}storage/
      MEDPLUM_SIGNING_KEY: dev-only-not-for-production-signing-key-replace-before-deploy
      MEDPLUM_SIGNING_KEY_PASSPHRASE: dev-only
      MEDPLUM_SUPPORT_EMAIL: support@localhost
      MEDPLUM_APP_BASE_URL: http://localhost:5173/
      MEDPLUM_LOG_LEVEL: WARN
    ports:
      - "8103:8103"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  triton:
    # CPU stub for frontend-only work — serves fixture responses on the 5 ML endpoints.
    image: nvcr.io/nvidia/tritonserver:24.10-py3
    container_name: liverra-triton
    command: >
      tritonserver
      --model-repository=/models
      --strict-model-config=false
      --log-verbose=0
    ports:
      - "8000:8000"   # HTTP
      - "8001:8001"   # gRPC
      - "8002:8002"   # metrics
    volumes:
      - ../../packages/ml-inference/triton-models:/models:ro
    # No GPU claim — CPU mode for zero-GPU dev machines.

  minio:
    image: minio/minio:latest
    container_name: liverra-minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-liverra}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-liverra-dev-password}
    command: ["server", "/data", "--console-address", ":9001"]
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - liverra_minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  mailhog:
    image: mailhog/mailhog:latest
    container_name: liverra-mailhog
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI

  # ---------------------------------------------------------------------
  # LiverRa orchestrator + Celery worker — laptop side after the Option B
  # split (2026-05-09). Both reference LIVERRA_INFERENCE_URL pointing at
  # the GPU microservice on Irakli's box (packages/ml-inference-gpu/).
  # ---------------------------------------------------------------------
  liverra-api: &liverra-app
    build:
      context: ../../packages/ml-inference
      dockerfile: Dockerfile
    image: liverra/ml-inference:dev
    container_name: liverra-api
    ports:
      - "8090:8090"
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-liverra}:${POSTGRES_PASSWORD:-liverra}@postgres:5432/${POSTGRES_DB:-liverra}
      DATABASE_URL_SYNC: postgresql://${POSTGRES_USER:-liverra}:${POSTGRES_PASSWORD:-liverra}@postgres:5432/${POSTGRES_DB:-liverra}
      AWS_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-liverra}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-liverra-dev-password}
      AWS_REGION: eu-central-1
      LIVERRA_PHASES_BUCKET: ${LIVERRA_PHASES_BUCKET:-liverra-phases-eu-central-1}
      LIVERRA_ANALYSES_BUCKET: ${LIVERRA_ANALYSES_BUCKET:-liverra-analyses-eu-central-1}
      LIVERRA_INFERENCE_URL: ${LIVERRA_INFERENCE_URL:-http://100.124.94.29:9101}
      LIVERRA_INFERENCE_TIMEOUT_S: ${LIVERRA_INFERENCE_TIMEOUT_S:-1800}
      # Required by inference_client — refuses to send unauthenticated
      # requests if the env var is missing. Set in .env (gitignored).
      LIVERRA_GPU_SHARED_TOKEN: ${LIVERRA_GPU_SHARED_TOKEN:-}
      LIVERRA_TS_COMMERCIAL_LICENSED: ${LIVERRA_TS_COMMERCIAL_LICENSED:-false}
      LIVERRA_CASCADE_REAL_MODE: "true"
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: db+postgresql://${POSTGRES_USER:-liverra}:${POSTGRES_PASSWORD:-liverra}@postgres:5432/${POSTGRES_DB:-liverra}
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
      minio:    { condition: service_started }
    command: ["uvicorn", "src.main:app", "--host", "0.0.0.0", "--port", "8090"]

  liverra-celery:
    <<: *liverra-app
    container_name: liverra-celery
    ports: []
    command: ["celery", "-A", "src.workers.app", "worker", "--loglevel=info", "--concurrency=1"]

volumes:
  liverra_postgres_data:
  liverra_redis_data:
  liverra_orthanc_data:
  liverra_minio_data:
