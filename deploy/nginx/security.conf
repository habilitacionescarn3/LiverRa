#
# deploy/nginx/security.conf — edge security headers (T409).
#
# Plain-English:
#   The FastAPI middleware (src/middleware/security_headers.py) stamps
#   the same headers on every API response; this nginx include layers
#   them onto static assets + any route that bypasses the app. Keep
#   both in sync when editing.
#
# Usage in a server{} block:
#   include /etc/nginx/conf.d/security.conf;
#
# CSP note: connect-src origins are interpolated by the deploy
# pipeline — replace the ${MEDPLUM_URL} / ${SENTRY_URL} tokens before
# shipping.
#
# References:
#   - spec.md §FR-028a (bypass hardening — frame-ancestors 'none')
#   - plan.md §Security Headers

add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; connect-src 'self' ${MEDPLUM_URL} ${SENTRY_URL}; img-src 'self' data: blob:; worker-src 'self' blob:; font-src 'self' data:; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'" always;
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
add_header X-Content-Type-Options "nosniff" always;
add_header X-Frame-Options "DENY" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

# Redact the default Server banner.
server_tokens off;
